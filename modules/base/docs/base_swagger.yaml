info:
  contact: {}
  description: Authentication, contacts, health, and user settings endpoints.
  title: AE SaaS Base API
  version: 1.0.0
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Change password for authenticated user
      operationId: changePassword
      parameters:
      - description: Password change request
        in: body
        name: request
        required: true
        schema:
          properties:
            current_password:
              type: string
            new_password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - authentication
  /auth/check-reset-token/{token}:
    get:
      description: Validate a password reset token to check if it's valid and not
        expired
      operationId: checkResetToken
      parameters:
      - description: Reset token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  properties:
                    email:
                      type: string
                    valid:
                      type: boolean
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      summary: Check password reset token
      tags:
      - authentication
  /auth/check-verification-token/{token}:
    get:
      description: Validate an email verification token to check if it's valid and
        not expired
      operationId: checkVerificationToken
      parameters:
      - description: Verification token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  properties:
                    email:
                      type: string
                    user_id:
                      type: integer
                    valid:
                      type: boolean
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      summary: Check email verification token
      tags:
      - authentication
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset email to user
      operationId: forgotPassword
      parameters:
      - description: User email
        in: body
        name: request
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      summary: Request password reset
      tags:
      - authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with username/email and password
      operationId: login
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      summary: User login
      tags:
      - authentication
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user and invalidate token
      operationId: logout
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - authentication
  /auth/me:
    get:
      consumes:
      - application/json
      description: Get current authenticated user information
      operationId: getCurrentUser
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - authentication
  /auth/new-password/{token}:
    post:
      consumes:
      - application/json
      description: Reset user password with reset token
      operationId: resetPassword
      parameters:
      - description: Reset token
        in: path
        name: token
        required: true
        type: string
      - description: New password
        in: body
        name: request
        required: true
        schema:
          properties:
            new_password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      summary: Reset password
      tags:
      - authentication
  /auth/password-security:
    get:
      consumes:
      - application/json
      description: Returns the current password security requirements including minimum
        length and character requirements
      operationId: getPasswordSecurity
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/utils.PasswordRequirements'
      summary: Get password security requirements
      tags:
      - authentication
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh user access token
      operationId: refreshToken
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Refresh access token
      tags:
      - authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account
      operationId: register
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.UserCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      summary: User registration
      tags:
      - authentication
  /auth/verify-email/{token}:
    get:
      consumes:
      - application/json
      description: Verify user email address with verification token
      operationId: verifyEmail
      parameters:
      - description: Verification token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      summary: Verify email address
      tags:
      - authentication
  /contacts:
    get:
      consumes:
      - application/json
      description: Get paginated list of contacts with optional filters
      operationId: getContacts
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by active status
        in: query
        name: active
        type: boolean
      - description: Filter by contact type (business, personal, etc)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ListResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all contacts
      tags:
      - contacts
    post:
      consumes:
      - application/json
      description: Create a new contact for the authenticated user
      operationId: createContact
      parameters:
      - description: Contact data
        in: body
        name: contact
        required: true
        schema:
          $ref: '#/definitions/models.ContactCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.ContactResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create new contact
      tags:
      - contacts
  /contacts/{id}:
    delete:
      consumes:
      - application/json
      description: Soft delete a contact by ID
      operationId: deleteContact
      parameters:
      - description: Contact ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete contact
      tags:
      - contacts
    get:
      consumes:
      - application/json
      description: Get a specific contact by ID
      operationId: getContactById
      parameters:
      - description: Contact ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Contact'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get contact by ID
      tags:
      - contacts
    put:
      consumes:
      - application/json
      description: Update an existing contact by ID
      operationId: updateContact
      parameters:
      - description: Contact ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Updated contact data
        in: body
        name: contact
        required: true
        schema:
          $ref: '#/definitions/models.ContactUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.ContactResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update contact
      tags:
      - contacts
  /contacts/form:
    post:
      consumes:
      - application/json
      description: Public endpoint to submit a contact form (no authentication required)
      operationId: submitContactForm
      parameters:
      - description: Contact form data
        in: body
        name: form
        required: true
        schema:
          $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ContactFormRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      summary: Submit contact form
      tags:
      - contact-form
  /contacts/newsletter:
    get:
      consumes:
      - application/json
      description: Get all newsletter subscriptions
      operationId: getNewsletterSubscriptions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.Newsletter'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_AgileExecutives_serverbase_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get newsletter subscriptions
      tags:
      - newsletter
  /contacts/newsletter/unsubscribe:
    delete:
      consumes:
      - application/json
      description: Unsubscribe an email address from the newsletter
      operationId: unsubscribeFromNewsletter
      parameters:
      - description: Email address to unsubscribe
        in: query
        name: email
